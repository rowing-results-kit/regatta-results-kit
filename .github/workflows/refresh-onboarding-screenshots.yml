name: オンボーディングスクショ週次自動更新

on:
  schedule:
    # 毎週月曜 09:00 JST (= UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force_commit:
        description: '差分がなくても強制コミットする'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  refresh-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture screenshots (login-free pages only)
        run: node .github/scripts/capture-onboarding-screenshots.mjs

      - name: Update SCREENSHOT_MANIFEST.md dates
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/| 2[0-9]\{3\}-[0-9]\{2\}-[0-9]\{2\} — 毎週月曜自動更新/| ${TODAY} — 毎週月曜自動更新/g" docs/onboarding/index.html || true
          # Update manifest auto-captured rows
          sed -i "s/取得済 | [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} | https/取得済 | ${TODAY} | https/g" docs/onboarding/SCREENSHOT_MANIFEST.md || true
          sed -i "s/^| 更新履歴 更新日 |.*//" docs/onboarding/SCREENSHOT_MANIFEST.md || true
          echo "Updated dates to ${TODAY}"

      - name: Check for changes
        id: changes
        run: |
          git add docs/assets/img/onboarding/*.png docs/onboarding/index.html docs/onboarding/SCREENSHOT_MANIFEST.md
          if git diff --cached --quiet && [ "${{ inputs.force_commit }}" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — skipping commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TODAY=$(date +%Y-%m-%d)
          git commit -m "chore(onboarding): スクショ週次自動更新 ${TODAY}

          ログイン不要の公開画面6枚を再撮影してオンボーディングガイドに反映。
          - gh-template-repo.png / gh-login.png / gh-actions-tab-example.png
          - cf-pages.png / google-drive-login.png / gas-landing.png

          Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>"
          git push

      - name: Manual reminder (monthly, first Monday)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          # 月の1日〜7日の月曜（= 月初の月曜）かどうか判定
          DAY=$(date +%d)
          if [ "$DAY" -le "07" ]; then
            echo "FIRST_MONDAY=true" >> "$GITHUB_ENV"
          else
            echo "FIRST_MONDAY=false" >> "$GITHUB_ENV"
          fi

      - name: Create manual screenshot reminder issue
        if: env.FIRST_MONDAY == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const body = `## 月次手動スクショ確認リマインダー

            オンボーディングガイドのログイン必須画面は自動撮影できないため、月1回の手動確認が必要です。

            ### 確認が必要な画面一覧

            1. \`cf-pages-create.png\` — Cloudflare Pages 作成画面（Connect to Git）
            2. \`cf-pages-build-settings.png\` — Cloudflare ビルド設定（Build output directory = site）
            3. \`gh-actions-setup-workflow.png\` — Actions 左サイドバー「大会初期構築」
            4. \`gh-actions-run-workflow.png\` — Run workflow フォーム
            5. \`gh-actions-error-log.png\` — Actions ジョブ失敗ログ
            6. \`google-drive-folder-id.png\` — Drive フォルダのURL（フォルダIDが見える状態）
            7. \`gas-editor-copy.png\` — GAS「ファイル → コピーを作成」
            8. \`gas-script-properties.png\` — GAS スクリプトプロパティ設定
            9. \`gh-pat-create-form.png\` — GitHub PAT Fine-grained 作成フォーム
            10. \`gh-pat-generated.png\` — PAT 生成直後のコピー画面
            11. \`gas-deploy-webapp.png\` — GAS デプロイ設定（ウェブアプリ）
            12. \`admin-portal-complete.png\` — 管理者ポータル完了状態

            ### 手順

            1. 各画面をブラウザ（幅1280px推奨）でスクショ（Cmd+Shift+4 など）
            2. \`docs/assets/img/onboarding/\` に上のファイル名で保存
            3. \`docs/onboarding/SCREENSHOT_MANIFEST.md\` の「取得状況」と「撮影日」を更新
            4. \`docs/onboarding/index.html\` の \`manual-todo-badge\` を実スクショ \`screenshot-frame\` に書き換え
            5. コミット・プッシュ

            自動生成: ${today}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[月次] オンボーディング手動スクショ確認 ${today}`,
              body: body,
              labels: ['documentation'],
            });
