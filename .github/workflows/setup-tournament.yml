name: 大会初期構築

on:
  workflow_dispatch:
    inputs:
      tournament_name:
        description: '大会名（例: 第01回○○マスターズレガッタ）'
        required: true
        type: string
      venue:
        description: '会場（例: ○○漕艇競技場）'
        required: true
        type: string
      start_date:
        description: '開始日（例: 2026/06/14 または 2026-06-14）'
        required: true
        type: string
      end_date:
        description: '終了日（例: 2026/06/15 または 2026-06-15）'
        required: true
        type: string
      primary_color:
        description: 'メインカラー（例: #1a3a5c）'
        required: false
        default: '#2D4F2C'
        type: string

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 入力バリデーション
        id: validate
        env:
          INPUT_TOURNAMENT_NAME: ${{ inputs.tournament_name }}
          INPUT_VENUE: ${{ inputs.venue }}
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_END_DATE: ${{ inputs.end_date }}
          INPUT_PRIMARY_COLOR: ${{ inputs.primary_color }}
        run: |
          set -euo pipefail

          ERROR_MESSAGES=""
          HAS_ERROR=false

          # 日付を正規化する関数（YYYY/M/D・YYYY/MM/DD・YYYY-MM-DD → YYYY-MM-DD）
          # 正規化できない場合は空文字を返す
          normalize_date() {
            local raw="$1"
            local year month day normalized

            # スラッシュ区切り: YYYY/M/D または YYYY/MM/DD
            if echo "$raw" | grep -qE '^[0-9]{4}/[0-9]{1,2}/[0-9]{1,2}$'; then
              year=$(echo "$raw" | cut -d'/' -f1)
              month=$(echo "$raw" | cut -d'/' -f2)
              day=$(echo "$raw" | cut -d'/' -f3)
            # ハイフン区切り: YYYY-M-D または YYYY-MM-DD
            elif echo "$raw" | grep -qE '^[0-9]{4}-[0-9]{1,2}-[0-9]{1,2}$'; then
              year=$(echo "$raw" | cut -d'-' -f1)
              month=$(echo "$raw" | cut -d'-' -f2)
              day=$(echo "$raw" | cut -d'-' -f3)
            else
              echo ""
              return
            fi

            # 範囲チェック（月: 1-12 / 日: 1-31）
            if [ "$month" -lt 1 ] || [ "$month" -gt 12 ]; then
              echo ""
              return
            fi
            if [ "$day" -lt 1 ] || [ "$day" -gt 31 ]; then
              echo ""
              return
            fi

            # ゼロ埋め正規化
            normalized=$(printf "%04d-%02d-%02d" "$year" "$month" "$day")
            echo "$normalized"
          }

          # 大会名・会場: 空チェック
          if [ -z "$INPUT_TOURNAMENT_NAME" ]; then
            ERROR_MESSAGES="${ERROR_MESSAGES}
          ### 大会名が入力されていません

          入力値: （空）

          **正しい入力例**: \`第01回○○マスターズレガッタ\`
          "
            HAS_ERROR=true
          fi

          if [ -z "$INPUT_VENUE" ]; then
            ERROR_MESSAGES="${ERROR_MESSAGES}
          ### 会場が入力されていません

          入力値: （空）

          **正しい入力例**: \`○○漕艇競技場\`
          "
            HAS_ERROR=true
          fi

          # 開始日: 正規化
          NORMALIZED_START=$(normalize_date "$INPUT_START_DATE")
          if [ -n "$NORMALIZED_START" ]; then
            echo "start_date=${NORMALIZED_START}" >> "$GITHUB_OUTPUT"
          else
            RAW_START=$(printf '%s' "$INPUT_START_DATE")
            ERROR_MESSAGES="${ERROR_MESSAGES}
          ### 開始日の形式が正しくありません

          入力値: \`${RAW_START}\`

          **正しい形式**: \`2026/06/14\` のように **スラッシュ区切り（YYYY/MM/DD）** で入力してください。
          ハイフン区切り（2026-06-14）も使えます。月・日は1桁でも構いません（例: 2026/6/1）。
          "
            HAS_ERROR=true
          fi

          # 終了日: 正規化
          NORMALIZED_END=$(normalize_date "$INPUT_END_DATE")
          if [ -n "$NORMALIZED_END" ]; then
            echo "end_date=${NORMALIZED_END}" >> "$GITHUB_OUTPUT"
          else
            RAW_END=$(printf '%s' "$INPUT_END_DATE")
            ERROR_MESSAGES="${ERROR_MESSAGES}
          ### 終了日の形式が正しくありません

          入力値: \`${RAW_END}\`

          **正しい形式**: \`2026/06/15\` のように **スラッシュ区切り（YYYY/MM/DD）** で入力してください。
          ハイフン区切り（2026-06-15）も使えます。月・日は1桁でも構いません（例: 2026/6/2）。
          "
            HAS_ERROR=true
          fi

          # メインカラーのフォーマットチェック（#RRGGBB）
          # NG の場合はデフォルト値にフォールバック（失敗扱いにしない）
          if echo "$INPUT_PRIMARY_COLOR" | grep -qE '^#[0-9A-Fa-f]{6}$'; then
            PRIMARY_COLOR="$INPUT_PRIMARY_COLOR"
            echo "color_fallback=false" >> "$GITHUB_OUTPUT"
          else
            PRIMARY_COLOR="#2D4F2C"
            echo "color_fallback=true" >> "$GITHUB_OUTPUT"
            RAW_COLOR=$(printf '%s' "$INPUT_PRIMARY_COLOR")
            # カラーは失敗扱いにしないがSummaryに通知（カラーフォールバックステップで処理）
            echo "color_raw=${RAW_COLOR}" >> "$GITHUB_OUTPUT"
          fi
          echo "primary_color=${PRIMARY_COLOR}" >> "$GITHUB_OUTPUT"

          if [ "$HAS_ERROR" = "true" ]; then
            # Actions Summary に日本語でエラー理由と直し方を表示
            {
              cat << 'SUMMARY_EOF'
          ## 大会初期構築 — 入力エラー

          入力内容に問題があったため、処理を中止しました。
          以下の内容を確認して、もう一度 **Run workflow** を実行してください。

          SUMMARY_EOF
              echo "$ERROR_MESSAGES"
              cat << 'SUMMARY_EOF2'

          ---

          ### やり直し方

          1. 右上の **Run workflow** ボタンをクリック
          2. 各項目を上の説明に従って修正
          3. **Run workflow** をクリックして再実行

          SUMMARY_EOF2
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: カラーフォールバック通知
        if: steps.validate.outputs.color_fallback == 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ## メインカラーの注意

          入力されたカラーコードの形式が正しくないため、
          デフォルト値 `#2D4F2C` を使用しました。

          カラーコードは `#1a3a5c` のように **# から始まる6桁の英数字**で指定してください。
          変更したい場合は、再度 Run workflow でカラーコードを修正してください。

          SUMMARY_EOF

      - name: tournament.config.json 生成
        env:
          TOURNAMENT_NAME: ${{ inputs.tournament_name }}
          VENUE: ${{ inputs.venue }}
          START_DATE: ${{ steps.validate.outputs.start_date }}
          END_DATE: ${{ steps.validate.outputs.end_date }}
          PRIMARY_COLOR: ${{ steps.validate.outputs.primary_color }}
          GITHUB_REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPO_FULL}"
          GITHUB_REPO="${REPO_NAME##*/}"
          export GITHUB_REPO
          TOURNAMENT_ID="tournament-$(echo "${START_DATE}" | tr -d '-')"
          export TOURNAMENT_ID

          python3 - << 'PYEOF'
          import json
          import os

          tournament_name = os.environ["TOURNAMENT_NAME"]
          venue = os.environ["VENUE"]
          start_date = os.environ["START_DATE"]
          end_date = os.environ["END_DATE"]
          primary_color = os.environ["PRIMARY_COLOR"]
          github_repo = os.environ["GITHUB_REPO"]
          tournament_id = os.environ["TOURNAMENT_ID"]

          config = {
              "tournament": {
                  "id": tournament_id,
                  "name": tournament_name,
                  "venue": venue,
                  "dates": [start_date, end_date],
                  "hub_url": "",
              },
              "brand": {
                  "primary_color": primary_color,
                  "accent_color": "#ffffff",
                  "font_family": "Noto Sans JP",
              },
              "default_course": {
                  "length_m": 1000,
                  "measurement_points": [500, 1000],
              },
              "categories": ["M", "W", "X"],
              "deploy": {
                  "github_repo": github_repo,
                  "pages_url": "",
                  "test_pages_url": "",
              },
              "gas": {},
          }

          with open("/tmp/tournament.config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          print("tournament.config.json を生成しました")
          print(f"  大会名: {config['tournament']['name']}")
          print(f"  会場: {config['tournament']['venue']}")
          print(f"  開催日: {', '.join(config['tournament']['dates'])}")
          print(f"  メインカラー: {config['brand']['primary_color']}")
          PYEOF

      - name: scaffold 実行
        run: |
          python3 tools/scaffold.py --config /tmp/tournament.config.json

      - name: tournament.config.json をリポジトリにコピー
        run: |
          cp /tmp/tournament.config.json tournament.config.json
          echo "tournament.config.json をリポジトリルートにコピーしました"

      - name: 生成ファイルをコミット
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TOURNAMENT_NAME: ${{ inputs.tournament_name }}
          VALIDATED_COLOR: ${{ steps.validate.outputs.primary_color }}
          START_DATE: ${{ steps.validate.outputs.start_date }}
          END_DATE: ${{ steps.validate.outputs.end_date }}
          VENUE: ${{ inputs.venue }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add site/ staff/ docs/SETUP_GUIDE.generated.md 2>/dev/null || true
          # tournament.config.json は .gitignore 対象のため -f で明示的にステージ（サイレント除外を防止）
          git add -f tournament.config.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "変更なし、コミットをスキップします（2回目以降の実行）"
            SKIPPED=true
          else
            COMMIT_MSG="scaffold: 大会初期構築 [${TOURNAMENT_NAME}]"
            git commit -m "$COMMIT_MSG"
            git push
            SKIPPED=false
          fi

          # Actions Summary に結果を表示
          if [ "$SKIPPED" = "true" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ## 大会初期構築 — 変更なし・コミットをスキップしました（2回目以降）

          前回の実行から内容に変化がないため、コミットをスキップしました（正常です）。
          速報サイトはすでに設定済みです。再度実行する必要はありません。

          > **補足**: このメッセージは同じ設定で 2 回目以降に実行した場合に表示されます。エラーではありません。
          SUMMARY_EOF
          else
            {
              echo "## 大会初期構築 — 完了"
              echo ""
              echo "以下の設定で速報サイトの初期構築が完了しました。"
              echo ""
              echo "| 項目 | 設定値 |"
              echo "|---|---|"
              printf "| 大会名 | %s |\n" "${TOURNAMENT_NAME}"
              printf "| 会場 | %s |\n" "${VENUE}"
              printf "| 開始日 | %s |\n" "${START_DATE}"
              printf "| 終了日 | %s |\n" "${END_DATE}"
              printf "| メインカラー | %s |\n" "${VALIDATED_COLOR}"
              echo ""
              echo "### 次のステップ"
              echo ""
              echo "1. **Cloudflare Pages** が自動デプロイされるまで 2〜5 分待つ"
              echo "2. 速報サイトの URL を開いて大会名・会場・日程が表示されることを確認する"
              echo "3. Google Drive フォルダの作成（Step 4）に進む"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
