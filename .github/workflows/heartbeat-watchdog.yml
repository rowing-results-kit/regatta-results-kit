name: GAS heartbeat watchdog

on:
  # 定期実行は常時ONにしておく（2026-07-15 再有効化）。
  # 大会が近くない期間に無駄打ちしないよう、ジョブ側で site/data/master.json の
  # 大会日程を読み「大会前日〜最終日翌日」以外は即 exit する（下の「大会期間ガード」）。
  # → 大会終了後に schedule をコメントアウトする運用（＝次大会で復活を忘れる事故）は不要。
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Issue/comment creationをスキップする'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      force_elapsed_minutes:
        description: '検証用: 経過分を上書きする (空なら実測)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TZ: Asia/Tokyo
    steps:
      - name: Checkout main history
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Check heartbeat and notify
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          FORCE_ELAPSED_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.force_elapsed_minutes || '' }}
        run: |
          set -euo pipefail

          LABEL="heartbeat-alert"
          MESSAGE_PATTERN="heartbeat: update last_trigger_at"
          EVENT_NAME="${{ github.event_name }}"

          now_ts=$(date +%s)
          now_jst=$(TZ=Asia/Tokyo date '+%Y/%m/%d %H:%M:%S JST')

          # ------------------------------------------------------------
          # 大会期間ガード
          #   site/data/master.json の tournament.dates（大会日程）を読み、
          #   「大会前日〜最終日翌日」の外なら監視せず即終了する。
          #   これにより schedule は常時ONのままでよく、平常時は無駄打ちせず、
          #   大会日程を入れれば自動で監視が生きる（復活忘れ事故の防止）。
          # ------------------------------------------------------------
          CONFIG_FILE="site/data/master.json"
          TOURNAMENT_START=""
          TOURNAMENT_END=""

          if [ -f "$CONFIG_FILE" ]; then
            # 日程の最初と最後を取り出す（"YYYY-MM-DD YYYY-MM-DD" の1行）。
            # ※ python は必ず1行で書く。-c に渡すコードを字下げすると IndentationError になり、
            #    try/except でも捕捉できない（コンパイル時エラー）ため常に空になる。
            DATES=$(python3 -c "import json;c=json.load(open('$CONFIG_FILE'));d=sorted(x for x in c.get('tournament',{}).get('dates',[]) if x);print(d[0]+' '+d[-1]) if d else print('')" 2>/dev/null || true)
            TOURNAMENT_START=$(echo "$DATES" | awk '{print $1}')
            TOURNAMENT_END=$(echo "$DATES" | awk '{print $2}')
          fi

          if [ -z "$TOURNAMENT_START" ] || [ -z "$TOURNAMENT_END" ]; then
            echo "status=SKIP: ${CONFIG_FILE} に大会日程(tournament.dates)が無いため監視をスキップします"
            exit 0
          fi

          # 大会初日 00:00 / 最終日 23:59:59（JST）
          # ※ "+1 day" 等の相対指定は date が数値タイムゾーンと解釈しうるため使わず、秒で加減算する
          #    （日本にサマータイムは無いので 86400 秒＝1日で正確）
          race_days_start_ts=$(TZ=Asia/Tokyo date -d "${TOURNAMENT_START} 00:00:00" +%s)
          race_days_end_ts=$(TZ=Asia/Tokyo date -d "${TOURNAMENT_END} 23:59:59" +%s)

          # 監視ウィンドウ: 大会前日 00:00 〜 最終日翌日 23:59:59（JST）
          window_start_ts=$((race_days_start_ts - 86400))
          window_end_ts=$((race_days_end_ts + 86400))

          echo "tournament_dates=${TOURNAMENT_START}〜${TOURNAMENT_END}"
          echo "watch_window=$(TZ=Asia/Tokyo date -d "@${window_start_ts}" '+%Y/%m/%d %H:%M')〜$(TZ=Asia/Tokyo date -d "@${window_end_ts}" '+%Y/%m/%d %H:%M') JST"

          if [ "$now_ts" -lt "$window_start_ts" ] || [ "$now_ts" -gt "$window_end_ts" ]; then
            echo "status=SKIP: 大会期間外のため監視をスキップします (now=${now_jst})"
            exit 0
          fi

          # 大会当日（初日00:00〜最終日23:59:59）は閾値を厳しく、前日・翌日は緩めにする
          if [ "$now_ts" -ge "$race_days_start_ts" ] && [ "$now_ts" -le "$race_days_end_ts" ]; then
            threshold_minutes=15
            period_label="大会期間"
          else
            threshold_minutes=30
            period_label="大会前日・翌日"
          fi

          last_ts=$(git log origin/main --grep="$MESSAGE_PATTERN" -1 --format=%at || true)
          if [ -n "$last_ts" ]; then
            last_jst=$(TZ=Asia/Tokyo date -d "@$last_ts" '+%Y/%m/%d %H:%M:%S JST')
            elapsed_minutes=$(( (now_ts - last_ts) / 60 ))
            elapsed_label="${elapsed_minutes}分前"
          else
            last_jst="未検出"
            elapsed_minutes=999999
            elapsed_label="${elapsed_minutes}分前"
          fi

          if [ -n "${FORCE_ELAPSED_MINUTES:-}" ]; then
            elapsed_minutes="$FORCE_ELAPSED_MINUTES"
            elapsed_label="${elapsed_minutes}分前"
          fi

          echo "event=${EVENT_NAME}"
          echo "now_jst=${now_jst}"
          echo "period=${period_label}"
          echo "threshold_minutes=${threshold_minutes}"
          echo "last_heartbeat_jst=${last_jst}"
          echo "elapsed_minutes=${elapsed_minutes}"
          echo "dry_run=${DRY_RUN}"

          if [ "$elapsed_minutes" -le "$threshold_minutes" ]; then
            echo "status=OK: heartbeat is within threshold"
            exit 0
          fi

          title="⚠️ GAS heartbeat 途絶検知 (${elapsed_label})"
          body=$(cat <<EOF
          ## GAS heartbeat 途絶検知

          | 項目 | 値 |
          |---|---|
          | 検知日時 | ${now_jst} |
          | 判定期間 | ${period_label} |
          | 閾値 | ${threshold_minutes}分 |
          | 経過時間 | ${elapsed_label} |
          | 直近heartbeat時刻 | ${last_jst} |
          | 対象コミット | ${MESSAGE_PATTERN} |

          ## 調査ガイド

          1. GASエディタでトリガー実行履歴とエラーを確認してください。
          2. GitHub PATの有効期限、repo権限、Actions実行対象リポジトリへの書き込み権限を確認してください。
          3. Drive権限と対象スプレッドシート/ファイルへのアクセス権を確認してください。
          4. GASからGitHub APIへ疎通できているか、直近のレスポンスコードを確認してください。
          EOF
          )

          comment=$(cat <<EOF
          ## 追加検知

          | 項目 | 値 |
          |---|---|
          | 検知日時 | ${now_jst} |
          | 判定期間 | ${period_label} |
          | 閾値 | ${threshold_minutes}分 |
          | 経過時間 | ${elapsed_label} |
          | 直近heartbeat時刻 | ${last_jst} |

          同種Open Issueが既に存在するため、spam防止としてコメントのみ追加しました。
          EOF
          )

          echo "status=ALERT: heartbeat exceeded threshold"

          if [ "$DRY_RUN" = "true" ]; then
            echo "dry_run=true: skip issue/comment creation"
            echo "issue_title=${title}"
            exit 0
          fi

          gh label create "$LABEL" \
            --description "GAS heartbeat watchdog alert" \
            --color "EA580C" \
            --force

          existing_issue=$(gh issue list \
            --state open \
            --label "$LABEL" \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body "$comment"
            echo "commented_issue=${existing_issue}"
          else
            gh issue create \
              --title "$title" \
              --body "$body" \
              --label "$LABEL"
            echo "created_issue=true"
          fi
