<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>マスターズ判定員帳票生成</title>
  <style>
    :root {
      --navy-900: #0A1628;
      --navy: #152E58;
      --orange: #EA580C;
      --bg: #FFFFFF;
      --text: #1F2937;
      --muted: #6B7280;
      --panel: #F8FAFC;
      --danger: #DC2626;
      --ok: #15803D;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.8;
      /* 日本語の文字組み: 禁則を厳格に・約物を詰める */
      line-break: strict;
      font-feature-settings: "palt" 1;
    }
    /* 見出しは文節で折り返す（対応ブラウザのみ・非対応は通常の折返し） */
    h1, h2 { word-break: auto-phrase; }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }
    h1 {
      margin: 0 0 12px;
      color: var(--navy-900);
      font-size: 32px;
      line-height: 1.3;
      font-weight: 700;
    }
    h2 {
      margin: 40px 0 14px;
      color: var(--navy);
      font-size: 24px;
      line-height: 1.35;
      font-weight: 700;
    }
    p { margin: 0 0 16px; }
    .lead { color: var(--muted); font-size: 19px; }
    .card {
      margin: 18px 0;
      padding: 22px;
      background: var(--panel);
      box-shadow: 0 8px 28px rgba(10, 22, 40, 0.10);
      border-radius: 8px;
    }
    .card p { margin: 0 0 14px; }
    button {
      display: inline-block;
      padding: 12px 20px;
      color: #FFFFFF;
      background: var(--navy);
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled { background: var(--muted); cursor: progress; }
    select {
      padding: 10px 12px;
      margin-right: 10px;
      color: var(--text);
      background: #FFFFFF;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      border: 2px solid #D6DEE8;
      border-radius: 6px;
    }
    .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .msg {
      margin-top: 16px;
      padding: 16px;
      background: #FFF7ED;
      color: var(--navy-900);
      border-radius: 8px;
      overflow-wrap: anywhere;
    }
    .msg.ok { background: #F0FDF4; color: var(--ok); }
    .msg.err { background: #FEF2F2; color: var(--danger); }
    .hint { color: var(--muted); font-size: 16px; }
  </style>
</head>
<body>
  <main>
    <h1>マスターズ判定員帳票生成</h1>
    <p class="lead">ボタンを押すと判定員用の帳票を作成します。作成した PDF は Drive の出力フォルダに入ります。</p>
    <p class="hint">1回の作成に数十秒かかることがあります。ボタンを押したあとはそのままお待ちください。</p>

    <h2>判定員帳票</h2>
    <section class="card">
      <p>大会日ごとの判定員用帳票を作成します。</p>
      <div class="row">
        <button id="btnAllDays">全日程をまとめて作成</button>
      </div>
      <div class="row" style="margin-top:12px;">
        <select id="dateSelect"></select>
        <button id="btnOneDay">選んだ日だけ作成</button>
      </div>
      <div id="msgJudge"></div>
    </section>
  </main>

<script>
function $(id){ return document.getElementById(id); }

function setMsg(el, text, cls){
  el.innerHTML = '';
  var d = document.createElement('div');
  d.className = 'msg' + (cls ? ' ' + cls : '');
  d.textContent = text;
  el.appendChild(d);
}

/* 大会日程を読み込んでプルダウンに入れる */
function loadDates(){
  var s = $('dateSelect');
  s.innerHTML = '';
  var loading = document.createElement('option');
  loading.textContent = '読み込み中...';
  s.appendChild(loading);
  s.disabled = true;

  google.script.run.withSuccessHandler(function(res){
    s.innerHTML = '';
    if(!res || !res.ok || !res.dates || !res.dates.length){
      var o = document.createElement('option');
      o.value = '';
      o.textContent = '日程を取得できません';
      s.appendChild(o);
      if(res && !res.ok){
        setMsg($('msgJudge'), '大会日程の取得に失敗しました: ' + res.message, 'err');
      }
      return;
    }
    res.dates.forEach(function(d){
      var o = document.createElement('option');
      o.value = d;
      o.textContent = d;
      s.appendChild(o);
    });
    s.disabled = false;
  }).withFailureHandler(function(e){
    s.innerHTML = '';
    setMsg($('msgJudge'), '通信エラー: ' + (e && e.message ? e.message : e), 'err');
  }).webappGetDates();
}

/* ボタン → サーバー関数実行 */
function bind(btnId, action, msgId, selectId){
  $(btnId).addEventListener('click', function(){
    var btn = $(btnId);
    var dateStr = selectId ? $(selectId).value : '';
    if(selectId && !dateStr){
      setMsg($(msgId), '日付を選んでください。', 'err');
      return;
    }
    btn.disabled = true;
    setMsg($(msgId), '作成中です。そのままお待ちください...', '');
    google.script.run.withSuccessHandler(function(res){
      btn.disabled = false;
      if(!res){ setMsg($(msgId), '応答がありませんでした。', 'err'); return; }
      setMsg($(msgId), res.message, res.ok ? 'ok' : 'err');
    }).withFailureHandler(function(e){
      btn.disabled = false;
      setMsg($(msgId), '通信エラー: ' + (e && e.message ? e.message : e), 'err');
    }).webappRunAction(action, dateStr);
  });
}

bind('btnAllDays', 'allDays', 'msgJudge', null);
bind('btnOneDay', 'oneDay', 'msgJudge', 'dateSelect');

loadDates();
</script>
</body>
</html>
